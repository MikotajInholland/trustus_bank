services:
  - type: web
    name: trustus-bank-api
    runtime: java
    rootDir: backend
    buildCommand: ./mvnw -DskipTests package || mvn -DskipTests package
    startCommand: java -jar target/trustus-bank-0.0.1-SNAPSHOT.jar
    envVars:
      - key: TRUSTUS_JWT_SECRET
        generateValue: true
      - key: TRUSTUS_CORS_ALLOWED_ORIGINS
        sync: false
