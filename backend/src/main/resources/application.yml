spring:
  application:
    name: trustus-bank
  datasource:
    url: jdbc:h2:mem:trustusbank;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

trustus:
  jwt:
    secret: change-me-in-production-use-a-long-random-secret-key
    expiration-ms: 86400000
  currency: EUR
  iban:
    country-code: NL
    bank-code: INHO

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.trustus.bank: INFO
